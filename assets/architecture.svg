<rect x="0" y="0" width="1400" height="960" rx="0" ry="0" fill="#FFFFFF" />
<text x="64" y="52" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#1B2733" text-anchor="start" letter-spacing="0">Gecko — a control plane, never a data plane</text>
<text x="64" y="80" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15.5" font-weight="400" fill="#5C6E7E" text-anchor="start" letter-spacing="0">Comprehend the surface · inject auth · the agent calls the real API directly for data</text>
